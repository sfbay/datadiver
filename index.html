<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Dana favicon — SVG auto-swaps cream/espresso badge with OS theme;
         .ico (32px espresso) for legacy; apple-touch-icon (180px) for iOS -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#140c08" />
    <title>DataDiver — SF Civic Data Explorer</title>
    <meta name="description" content="San Francisco's civic data, alive: 911 response times, 311 reports, crime, crashes, parking, campaign finance — mapped, trended, and watchable in real time. No SQL required." />

    <!-- Social cards — og-image.png is 1200×630, lives in public/ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DataDiver" />
    <meta property="og:title" content="DataDiver — SF Civic Data Explorer" />
    <meta property="og:description" content="San Francisco's civic data, alive: 911 response times, 311 reports, crime, crashes, parking — mapped, trended, and watchable in real time." />
    <meta property="og:url" content="https://datadiver.jlabsf.org/" />
    <meta property="og:image" content="https://datadiver.jlabsf.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DataDiver — SF Civic Data Explorer" />
    <meta name="twitter:description" content="San Francisco's civic data, alive — mapped, trended, watchable. No SQL required." />
    <meta name="twitter:image" content="https://datadiver.jlabsf.org/og-image.png" />
    <!-- Fonts are self-hosted via Fontsource, imported in src/main.tsx:
         · Fraunces (display) — variable opsz + wght 300..700, italic + roman
         · Roboto Serif (body) — variable opsz + wght 300..700, italic + roman
         · Space Mono (mono labels, data values) — static 400/700, italic + roman -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
